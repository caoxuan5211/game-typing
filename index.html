<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Typing - 代码打字练习</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Code Typing</h1>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="code">代码片段</button>
            <button class="mode-btn" data-mode="symbols">符号练习</button>
            <button class="mode-btn" data-mode="mixed">混合模式</button>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="label">时间</span>
                <span class="value" id="timer">0s</span>
            </div>
            <div class="stat">
                <span class="label">速度</span>
                <span class="value" id="wpm">0 WPM</span>
            </div>
            <div class="stat">
                <span class="label">正确率</span>
                <span class="value" id="accuracy">100%</span>
            </div>
        </div>

        <div class="code-display" id="codeDisplay"></div>

        <textarea
            id="input"
            placeholder="点击开始按钮后开始输入..."
            disabled
        ></textarea>

        <div class="controls">
            <button id="startBtn" class="btn primary">开始练习</button>
            <button id="resetBtn" class="btn">重置</button>
        </div>

        <div class="version">v0.0.1</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>完成！</h2>
            <p>速度: <strong id="finalWpm">0</strong> WPM</p>
            <p>正确率: <strong id="finalAccuracy">100</strong>%</p>
            <p>用时: <strong id="finalTime">0</strong>秒</p>
            <button id="restartBtn" class="btn primary">再来一次</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
