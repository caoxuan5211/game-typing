<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Typing - 代码打字练习</title>
    <meta name="description" content="A typing game for improving coding speed">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title-animated">
                <span class="letter">C</span>
                <span class="letter">o</span>
                <span class="letter">d</span>
                <span class="letter">e</span>
                <span class="space"> </span>
                <span class="letter highlight">T</span>
                <span class="letter highlight">y</span>
                <span class="letter highlight">p</span>
                <span class="letter highlight">i</span>
                <span class="letter highlight">n</span>
                <span class="letter highlight">g</span>
            </h1>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="code">代码片段</button>
            <button class="mode-btn" data-mode="symbols">符号练习</button>
            <button class="mode-btn" data-mode="mixed">混合模式</button>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-label">时间</div>
                <div class="stat-value" id="timer">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-label">正确率</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-label">速度</div>
                <div class="stat-value"><span id="wpm-value">0</span> WPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-label">正确数</div>
                <div class="stat-value" id="correct-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❌</div>
                <div class="stat-label">错误数</div>
                <div class="stat-value" id="error-count">0</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-label">进度</span>
                <span class="progress-count" id="progress-text">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-label">目标代码：</div>
            <div id="targetEditor" class="editor"></div>
        </div>

        <div class="editor-container">
            <div class="editor-label">在此输入：</div>
            <div id="inputEditor" class="editor"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">▶️ 开始 (Enter)</button>
            <button class="btn btn-secondary" id="restartBtn">🔄 重置 (R)</button>
        </div>

        <div class="version">v2.0.0</div>

        <div class="result-modal" id="resultModal">
            <div class="modal-content">
                <h2>🎉 完成！</h2>
                <div class="result-stats">
                    <div class="result-item">
                        <span class="result-label">速度</span>
                        <span class="result-value" id="finalWpm">0 WPM</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">正确率</span>
                        <span class="result-value" id="finalAccuracy">100%</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">用时</span>
                        <span class="result-value" id="finalTime">0s</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">正确/错误</span>
                        <span class="result-value" id="finalCounts">0 / 0</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="modalRestartBtn">再来一次</button>
                    <button class="btn btn-secondary" id="modalNextBtn">下一题</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="texts.js"></script>
    <script src="app.js"></script>
</body>
</html>
