<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人 - Code Typing Lab</title>
    <link rel="icon" href="/assets/favicon.svg?v=20260624-13" type="image/svg+xml">
    <link rel="stylesheet" href="css/common.css?v=20260624-13">
    <link rel="stylesheet" href="css/profile.css?v=20260624-13">
</head>
<body>
    <div class="app">
        <nav class="nav">
            <div class="nav-brand">
                <span class="nav-icon">CT</span>
                <span class="nav-title">Code Typing Lab</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/train" class="nav-link">训练</a>
                <a href="/stats" class="nav-link">统计</a>
                <a href="/profile" class="nav-link active">个人</a>
            </div>
            <div class="nav-actions">
                <a href="/login" class="btn btn-primary btn-sm">登录</a>
                <button class="icon-btn" id="soundToggle" title="音效">🔊</button>
                <button class="icon-btn" id="themeToggle" title="主题">🌙</button>
            </div>
        </nav>

        <main class="profile-container">
            <header class="profile-header">
                <div>
                    <h1>个人中心</h1>
                    <p>管理账号、训练偏好和本地数据。</p>
                </div>
                <div class="account-pill" id="accountPill">本地模式</div>
            </header>

            <section class="profile-grid">
                <div class="settings-panel account-panel">
                    <h2>账号</h2>
                    <div class="account-block">
                        <div class="avatar" id="avatar">U</div>
                        <div>
                            <div class="account-name" id="accountName">本地用户</div>
                            <div class="account-email" id="accountEmail">未登录，数据仅保存在当前浏览器</div>
                        </div>
                    </div>
                    <div class="profile-edit" id="profileEdit">
                        <label for="displayNameInput">账户名</label>
                        <input id="displayNameInput" type="text" maxlength="32" placeholder="输入账户名">
                        <label class="avatar-upload" for="avatarInput">更换头像</label>
                        <input class="file-input" id="avatarInput" type="file" accept="image/png,image/jpeg,image/webp">
                        <button class="btn btn-secondary" id="saveProfileBtn" type="button">保存资料</button>
                    </div>
                    <div class="button-row">
                        <a class="btn btn-primary" href="/login" id="loginBtn">登录 / 注册</a>
                        <button class="btn btn-secondary" id="logoutBtn" type="button">退出登录</button>
                    </div>
                </div>

                <div class="settings-panel">
                    <h2>训练设置</h2>
                    <label class="setting-row" for="dailyGoal">
                        <span>
                            <strong>每日目标</strong>
                            <small>统计页进度条使用的字符数目标</small>
                        </span>
                        <input id="dailyGoal" type="number" min="100" max="20000" step="100">
                    </label>
                    <label class="setting-row" for="codeFontSize">
                        <span>
                            <strong>代码字号</strong>
                            <small>训练显示区的等宽字体大小</small>
                        </span>
                        <input id="codeFontSize" type="number" min="14" max="36" step="1">
                    </label>
                    <label class="setting-row" for="tabSize">
                        <span>
                            <strong>Tab 宽度</strong>
                            <small>代码缩进显示宽度</small>
                        </span>
                        <input id="tabSize" type="number" min="2" max="8" step="1">
                    </label>
                </div>

                <div class="settings-panel">
                    <h2>偏好</h2>
                    <div class="segmented" role="group" aria-label="主题">
                        <button class="segment" data-theme-choice="light" type="button">亮色</button>
                        <button class="segment" data-theme-choice="dark" type="button">暗色</button>
                    </div>
                    <label class="switch-row">
                        <span>
                            <strong>音效</strong>
                            <small>按键、错误和完成提示音</small>
                        </span>
                        <input id="soundEnabled" type="checkbox">
                    </label>
                    <label class="switch-row">
                        <span>
                            <strong>自动同步</strong>
                            <small>登录后完成训练自动上传到服务器</small>
                        </span>
                        <input id="autoSync" type="checkbox">
                    </label>
                </div>

                <div class="settings-panel">
                    <h2>数据</h2>
                    <div class="metrics-row">
                        <div><strong id="totalRuns">0</strong><span>训练次数</span></div>
                        <div><strong id="bestWpm">0</strong><span>最佳 WPM</span></div>
                        <div><strong id="totalXP">0</strong><span>XP</span></div>
                    </div>
                    <div class="button-row wrap">
                        <button class="btn btn-primary" id="syncBtn" type="button">立即同步</button>
                        <button class="btn btn-secondary" id="exportBtn" type="button">导出数据</button>
                        <label class="btn btn-secondary import-btn" for="importInput">导入数据</label>
                        <input class="file-input" id="importInput" type="file" accept="application/json">
                        <button class="btn btn-secondary danger" id="clearBtn" type="button">清空本地数据</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="js/shell.js?v=20260624-13"></script>
    <script type="module" src="js/profile.js?v=20260624-13"></script>
</body>
</html>
