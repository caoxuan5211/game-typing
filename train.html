<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在 Mineguai Code Typing Lab 练习 CPP、HTML、SQL、JavaScript 代码打字和编程单词，提升程序员输入速度。">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://type.mineguai.com/train">
    <title>代码打字训练 - Code Typing Lab | Mineguai</title>
    <link rel="icon" href="/assets/favicon.svg?v=20260624-9" type="image/svg+xml">
    <link rel="stylesheet" href="css/common.css?v=20260624-9">
    <link rel="stylesheet" href="css/train.css?v=20260624-9">
</head>
<body>
    <div class="app">
        <!-- 导航栏 -->
        <nav class="nav">
            <div class="nav-brand">
                <span class="nav-icon">CT</span>
                <span class="nav-title">Code Typing Lab</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/train" class="nav-link active">训练</a>
                <a href="/stats" class="nav-link">统计</a>
                <a href="/profile" class="nav-link">个人</a>
            </div>
            <div class="nav-actions">
                <a href="/login" class="btn btn-primary btn-sm">登录</a>
                <button class="icon-btn" id="soundToggle" title="音效">🔊</button>
                <button class="icon-btn" id="themeToggle" title="主题">🌙</button>
            </div>
        </nav>

        <!-- 训练主区域 -->
        <main class="train-container">
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- 等级卡片 -->
                <div class="level-card">
                    <div class="level-info">
                        <div class="level-badge" id="levelBadge">Lv.1</div>
                        <div class="level-title" id="levelTitle">新手</div>
                    </div>
                    <div class="xp-bar">
                        <div class="xp-fill" id="xpFill"></div>
                    </div>
                    <div class="xp-text" id="xpText">0 / 100 XP</div>
                </div>

                <!-- 状态卡片 -->
                <div class="status-card">
                    <div class="status-indicator">
                        <span class="status-dot" id="statusDot"></span>
                        <span class="status-text" id="statusText">准备开始</span>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="stats-card">
                    <div class="stat-row">
                        <div class="stat-item">
                            <div class="stat-label">WPM</div>
                            <div class="stat-value" id="wpm">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">准确率</div>
                            <div class="stat-value" id="accuracy">100<span class="stat-unit">%</span></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-item">
                            <div class="stat-label">连击</div>
                            <div class="stat-value" id="combo">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">时间</div>
                            <div class="stat-value" id="time">0<span class="stat-unit">s</span></div>
                        </div>
                    </div>
                </div>

                <!-- 进度卡片 -->
                <div class="progress-card">
                    <div class="progress-header">
                        <span class="progress-grade" id="grade">-</span>
                        <span class="progress-percent" id="progressText">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>
                </div>

                <!-- 模式选择 -->
                <div class="mode-card">
                    <div class="card-title">训练模式</div>
                    <div class="mode-tabs" role="tablist" aria-label="训练模式">
                        <button class="mode-tab active" data-category="code" type="button">代码</button>
                        <button class="mode-tab" data-category="custom" type="button">自定义</button>
                        <button class="mode-tab" data-category="words" type="button">单词</button>
                    </div>
                    <div class="language-grid" id="languageGrid">
                        <button class="language-btn active" data-language="javascript" type="button">
                            <span class="language-name">JS</span>
                            <span class="language-desc">异步 / DOM / 逻辑</span>
                        </button>
                        <button class="language-btn" data-language="cpp" type="button">
                            <span class="language-name">CPP</span>
                            <span class="language-desc">模板 / 指针 / STL</span>
                        </button>
                        <button class="language-btn" data-language="html" type="button">
                            <span class="language-name">HTML</span>
                            <span class="language-desc">标签 / 属性 / 结构</span>
                        </button>
                        <button class="language-btn" data-language="sql" type="button">
                            <span class="language-name">SQL</span>
                            <span class="language-desc">查询 / 条件 / 聚合</span>
                        </button>
                    </div>
                    <div class="word-bank-grid hidden" id="wordBankGrid">
                        <button class="language-btn active" data-word-bank="cet4" type="button">
                            <span class="language-name">四级</span>
                            <span class="language-desc">CET-4 高频基础词</span>
                        </button>
                        <button class="language-btn" data-word-bank="cet6" type="button">
                            <span class="language-name">六级</span>
                            <span class="language-desc">CET-6 阅读写作词</span>
                        </button>
                        <button class="language-btn" data-word-bank="cpp" type="button">
                            <span class="language-name">CPP</span>
                            <span class="language-desc">include / namespace / STL</span>
                        </button>
                        <button class="language-btn" data-word-bank="javascript" type="button">
                            <span class="language-name">JS</span>
                            <span class="language-desc">DOM / async / module</span>
                        </button>
                        <button class="language-btn" data-word-bank="sql" type="button">
                            <span class="language-name">SQL</span>
                            <span class="language-desc">SELECT / JOIN / GROUP</span>
                        </button>
                    </div>
                    <button class="custom-entry hidden" id="editCustomBtn" type="button">编辑自定义文本</button>
                </div>

                <!-- 难度选择 -->
                <div class="difficulty-card">
                    <div class="card-title">难度</div>
                    <div class="difficulty-btns">
                        <button class="difficulty-btn" data-difficulty="easy">简单</button>
                        <button class="difficulty-btn active" data-difficulty="medium">标准</button>
                        <button class="difficulty-btn" data-difficulty="hard">困难</button>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-btns">
                    <button class="btn btn-primary btn-block" id="startBtn">
                        <span>开始训练</span>
                        <span class="btn-icon">→</span>
                    </button>
                    <button class="btn btn-secondary btn-block" id="pauseBtn" disabled>暂停</button>
                    <button class="btn btn-secondary btn-block" id="resetBtn">换一题</button>
                </div>
            </aside>

            <!-- 代码显示区（唯一的输入区） -->
            <section class="code-area">
                <div class="code-header">
                    <div class="code-info">
                        <span class="code-title" id="snippetTitle">选择模式开始</span>
                        <span class="code-meta" id="snippetMeta">0 字符</span>
                    </div>
                    <div class="code-actions">
                        <button class="icon-btn" id="resetCodeBtn" title="重置">🔄</button>
                    </div>
                </div>

                <div class="code-display" id="codeDisplay">
                    <div class="code-hint">
                        <div class="hint-icon">⌨️</div>
                        <h3>开始打字训练</h3>
                        <p>点击"开始训练"按钮，然后直接在此区域开始打字</p>
                        <p class="hint-tip">提示：按 ESC 暂停，按 Enter 可快速开始/继续</p>
                    </div>
                </div>

                <!-- 隐藏的 textarea 用于捕获输入 -->
                <textarea
                    id="hiddenInput"
                    class="hidden-input"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                ></textarea>
            </section>
        </main>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 自定义文本模态框 -->
    <div class="modal" id="customModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>自定义训练文本</h3>
                <button class="modal-close" id="closeModal">×</button>
            </div>
            <div class="modal-body">
                <div class="resource-import">
                    <input id="resourceUrl" type="url" placeholder="https://raw.githubusercontent.com/.../file.cpp">
                    <button class="btn btn-secondary" id="fetchResourceBtn" type="button">从 URL 导入</button>
                </div>
                <textarea
                    id="customText"
                    class="custom-textarea"
                    placeholder="粘贴你想练习的代码片段..."
                    spellcheck="false"
                ></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelCustom">取消</button>
                <button class="btn btn-primary" id="saveCustom">保存并开始</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/shell.js?v=20260624-9"></script>
    <script type="module" src="js/train.js?v=20260624-9"></script>
</body>
</html>
