<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Code Typing Lab</title>
    <link rel="icon" href="/assets/favicon.svg?v=20260624-13" type="image/svg+xml">
    <link rel="stylesheet" href="css/common.css?v=20260624-13">
    <link rel="stylesheet" href="css/auth.css?v=20260624-13">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">CT</div>
                <h1 class="auth-title">Code Typing Lab</h1>
                <p class="auth-subtitle">邮箱登录以同步你的训练数据</p>
            </div>

            <div class="auth-form" id="authForm">
                <!-- 输入邮箱 -->
                <div class="form-step" id="emailStep">
                    <div class="form-group">
                        <label for="emailInput">邮箱地址</label>
                        <input
                            type="email"
                            id="emailInput"
                            class="form-input"
                            placeholder="your@email.com"
                            autocomplete="email"
                        >
                    </div>
                    <button class="btn btn-primary btn-block" id="sendCodeBtn">
                        <span>获取验证码</span>
                    </button>
                </div>

                <!-- 输入验证码 -->
                <div class="form-step hidden" id="codeStep">
                    <div class="form-group">
                        <label for="codeInput">验证码</label>
                        <input
                            type="text"
                            id="codeInput"
                            class="form-input code-input"
                            placeholder="000000"
                            maxlength="6"
                            autocomplete="one-time-code"
                        >
                        <div class="form-hint">
                            验证码已发送至 <span id="sentEmail"></span>
                            <button class="resend-link" id="resendBtn">重新发送</button>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-block" id="verifyBtn">
                        <span>登录</span>
                    </button>
                    <button class="btn btn-secondary btn-block" id="backBtn">
                        <span>返回</span>
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                <p>没有账号？输入邮箱后会自动创建</p>
                <p class="auth-skip">
                    <a href="/train">跳过登录，使用本地模式</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Loading 遮罩 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">处理中...</div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <script type="module" src="js/auth.js?v=20260624-13"></script>
</body>
</html>
